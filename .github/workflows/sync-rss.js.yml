name: sync-rss

on:
  workflow_dispatch:
  schedule:
    - cron: "0 */6 * * *"

permissions:
  contents: write

jobs:
  sync-rss:
    runs-on: ubuntu-latest
    environment: DOUBAN

    env:
      DOUBAN_USER_ID: ${{ secrets.DOUBAN_USER_ID || vars.DOUBAN_USER_ID }}
      NOTION_TOKEN: ${{ secrets.NOTION_TOKEN || vars.NOTION_TOKEN }}
      NOTION_BOOK_DATABASE_ID: ${{ secrets.NOTION_BOOK_DATABASE_ID || vars.NOTION_BOOK_DATABASE_ID }}

      NOTION_MOVIE_DATABASE_ID: ${{ secrets.NOTION_MOVIE_DATABASE_ID || vars.NOTION_MOVIE_DATABASE_ID }}
      NOTION_MUSIC_DATABASE_ID: ${{ secrets.NOTION_MUSIC_DATABASE_ID || vars.NOTION_MUSIC_DATABASE_ID }}
      NOTION_GAME_DATABASE_ID: ${{ secrets.NOTION_GAME_DATABASE_ID || vars.NOTION_GAME_DATABASE_ID }}
      NOTION_DRAMA_DATABASE_ID: ${{ secrets.NOTION_DRAMA_DATABASE_ID || vars.NOTION_DRAMA_DATABASE_ID }}
      NEODB_API_TOKEN: ${{ secrets.NEODB_API_TOKEN || vars.NEODB_API_TOKEN }}
      NEODB_VISIBILITY: ${{ vars.NEODB_VISIBILITY || '2' }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Verify required environment variables
        run: |
          node - <<'NODE'
          const required = [
            'DOUBAN_USER_ID',
            'NOTION_TOKEN',
            'NOTION_BOOK_DATABASE_ID',
          ];

          let ok = true;

          for (const key of required) {
            const value = process.env[key];
            console.log(`${key}: ${value ? 'SET' : 'EMPTY'}`);
            if (!value) ok = false;
          }

          if (!ok) {
            console.error('Required environment variables are missing.');
            console.error('If you used Environment secrets, make sure the environment name in workflow matches exactly.');
            process.exit(1);
          }
          NODE

      - name: Run sync
        env:
          GITHUB_TOKEN: ${{ github.token }}
          DOUBAN_COOKIE: ${{ secrets.DOUBAN_COOKIE }}
        run: npm run sync
